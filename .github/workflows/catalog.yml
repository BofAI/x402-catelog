name: catalog

on:
  pull_request:
  push:
    branches: [main, test/open-meteo-catalog-flow]
    tags: ["tn-test-*", "v*"]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bofai/x402-catelog

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate public provider files
        run: python3 scripts/validate.py

      - name: Build static catalog snapshot
        run: python3 scripts/build.py

      - name: Verify generated files exist
        run: |
          test -f dist/status.json
          test -f dist/catalog.json
          test -f dist/categories.json
          test -f dist/search-index.json

      - name: Check Open-Meteo test provider is discoverable
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path("dist/catalog.json").read_text())
          fqns = {provider["fqn"] for provider in catalog["providers"]}
          assert "open-meteo-weather" in fqns, fqns
          PY

      - name: Upload static catalog snapshot
        uses: actions/upload-artifact@v4
        with:
          name: x402-catalog-dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build catalog image
        run: docker build -t x402-catalog:ci .

      - name: Run catalog container
        run: |
          docker run -d --name x402-catalog-ci -p 8088:8080 x402-catalog:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8088/api/status.json; then
              exit 0
            fi
            sleep 1
          done
          docker logs x402-catalog-ci
          exit 1

      - name: Smoke HTTP API
        run: |
          curl -fsS http://127.0.0.1:8088/api/catalog.json > /tmp/catalog.json
          curl -fsS http://127.0.0.1:8088/api/providers/open-meteo-weather.json > /tmp/provider.json
          curl -fsS http://127.0.0.1:8088/api/pay/open-meteo-weather.json > /tmp/pay.json
          curl -fsS http://127.0.0.1:8088/api/providers/bankofai-llm.json > /tmp/bankofai.json
          python3 -m json.tool /tmp/catalog.json > /dev/null
          python3 -m json.tool /tmp/provider.json > /dev/null
          python3 -m json.tool /tmp/pay.json > /dev/null
          python3 -m json.tool /tmp/bankofai.json > /dev/null

      - name: Stop catalog container
        if: always()
        run: docker rm -f x402-catalog-ci || true

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push catalog image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          sha_tag="sha-${GITHUB_SHA::12}"
          docker tag x402-catalog:ci "${IMAGE_NAME}:${sha_tag}"
          docker push "${IMAGE_NAME}:${sha_tag}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            branch_tag="${GITHUB_REF_NAME//\//-}"
            docker tag x402-catalog:ci "${IMAGE_NAME}:${branch_tag}"
            docker push "${IMAGE_NAME}:${branch_tag}"
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              docker tag x402-catalog:ci "${IMAGE_NAME}:latest"
              docker push "${IMAGE_NAME}:latest"
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            docker tag x402-catalog:ci "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            docker push "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          fi
