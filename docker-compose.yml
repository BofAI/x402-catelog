services:
  catalog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x402-catalog
    restart: unless-stopped
    ports:
      - "${X402_CATALOG_PORT:-8088}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/status.json', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
